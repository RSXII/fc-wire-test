<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate City: 1999 — Locations</title>
    <style>
      :root {
        --paper: #f3efe6;
        --paper-dark: #e8e1d2;
        --ink: #1c1a17;
        --ink-soft: #4a4540;
        --gold: #b8902f;
        --line: #cfc6b0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0d1118;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
        padding-top: 94px;
        padding-bottom: 48px;
        overflow-x: hidden;
      }
      /* ===== WIRE CHROME ===== */
      .wire-once {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: #7c3aed;
        z-index: 200;
      }
      .wire-status {
        position: fixed;
        top: 4px; left: 0; right: 0;
        height: 36px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 200;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-status-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .wire-sig {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
      }
      .wire-sig span {
        width: 3px;
        border-radius: 1px;
        background: #c9a227;
        display: inline-block;
      }
      .wire-skam {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: .8px;
        color: #c9a227;
      }
      .wire-jail {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #e05a3a;
        border: 1px solid rgba(224,90,58,.4);
        background: rgba(224,90,58,.08);
        padding: 2px 5px;
        border-radius: 2px;
      }
      .wire-clock {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11.5px;
        color: #6a7d90;
        letter-spacing: .3px;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-status-right {
        display: flex;
        align-items: center;
      }
      .wire-batt {
        width: 20px;
        height: 11px;
        border: 1.5px solid #4a5a6a;
        border-radius: 2px;
        padding: 1.5px;
        position: relative;
      }
      .wire-batt::after {
        content: '';
        position: absolute;
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        width: 2px;
        height: 5px;
        background: #4a5a6a;
        border-radius: 0 1px 1px 0;
      }
      .wire-batt-fill {
        height: 100%;
        width: 72%;
        background: #c9a227;
        border-radius: 1px;
      }
      .wire-header {
        position: fixed;
        top: 40px; left: 0; right: 0;
        height: 50px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        z-index: 200;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-hdr-back {
        font-size: 22px;
        color: #c9a227;
        opacity: .9;
        user-select: none;
        text-decoration: none;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      .wire-hdr-back:hover { opacity: 1; }
      .wire-hdr-text { flex: 1; }
      .wire-hdr-title {
        font-size: 13.5px;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: #e8dfc8;
        line-height: 1.1;
      }
      .wire-hdr-sub {
        font-size: 9.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #3a4a5a;
        margin-top: 2px;
      }
      .wire-hdr-more {
        font-size: 18px;
        color: #3a4a5a;
      }
      .wire-home {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 32px;
        background: #0c0f16;
        border-top: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .wire-home-ind {
        width: 90px;
        height: 4px;
        background: #1e2840;
        border-radius: 2px;
      }

      .section-divider {
        max-width: 760px;
        margin: 48px auto 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .section-divider.first {
        margin-top: 28px;
      }
      .section-divider::before,
      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(184, 144, 47, 0.25),
          transparent
        );
      }
      .section-divider-label {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #8a7a3a;
        white-space: nowrap;
      }

      .card {
        max-width: 760px;
        margin: 0 auto 36px;
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(0, 0, 0, 0.05) inset;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.015) 0px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
      }
      .stripe {
        height: 6px;
      }

      .dossier-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 28px 0;
        font-family: "Arial", sans-serif;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--ink-soft);
      }
      .dossier-head .stamp {
        font-weight: 700;
        letter-spacing: 1.5px;
      }
      .hr {
        margin: 10px 28px 0;
        border: none;
        border-top: 2px solid var(--rule, var(--gold));
      }

      .name-block {
        padding: 18px 28px 4px;
      }
      .name-block h2 {
        font-family: "Arial Black", "Arial", sans-serif;
        font-size: 30px;
        margin: 0;
        letter-spacing: 0.5px;
        color: #191713;
      }
      .name-block .epithet {
        font-style: italic;
        font-size: 15px;
        margin: 6px 0 0;
        color: var(--accent, var(--gold));
      }

      .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 14px 28px 6px;
      }
      .gallery .thumb {
        width: 92px;
        height: 92px;
        overflow: hidden;
        border: 1px solid var(--line);
        cursor: pointer;
        background: #fff;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .gallery .thumb:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
      }
      .gallery .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 9, 7, 0.92);
        z-index: 999;
        align-items: center;
        justify-content: center;
        padding: 30px;
        cursor: zoom-out;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 92vw;
        max-height: 88vh;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        border: 1px solid #444;
        cursor: default;
      }
      .lightbox .caption {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      .lightbox .close-x {
        position: absolute;
        top: 18px;
        right: 26px;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 28px;
        cursor: pointer;
        line-height: 1;
      }
      .lightbox .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 36px;
        cursor: pointer;
        padding: 10px 16px;
        user-select: none;
      }
      .lightbox .nav-arrow.prev {
        left: 6px;
      }
      .lightbox .nav-arrow.next {
        right: 6px;
      }

      .stats {
        margin: 18px 28px 4px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
      }
      .stat-row {
        display: flex;
        gap: 14px;
        padding: 5px 0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
      }
      .stat-row .label {
        flex: 0 0 130px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--accent, var(--gold));
        text-transform: uppercase;
        font-size: 11.5px;
      }
      .stat-row .value {
        color: #222;
      }

      .section {
        padding: 6px 28px 0;
      }
      .section h3 {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #222;
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
        margin: 20px 0 10px;
      }
      .section p {
        font-size: 15.5px;
        line-height: 1.65;
        color: #2a2722;
        margin: 0 0 12px;
      }
      ul.hooks {
        margin: 0 0 6px;
        padding-left: 0;
        list-style: none;
      }
      ul.hooks li {
        font-size: 15px;
        line-height: 1.55;
        color: #2a2722;
        margin: 0 0 9px;
        padding-left: 20px;
        position: relative;
      }
      ul.hooks li::before {
        content: "\2013";
        position: absolute;
        left: 0;
        color: var(--accent, var(--gold));
        font-weight: 700;
      }

      blockquote {
        margin: 16px 28px 6px;
        padding: 6px 0 6px 18px;
        border-left: 3px solid var(--accent, var(--gold));
        font-style: italic;
        font-size: 15px;
        color: #3a3630;
      }
      blockquote .cite {
        display: block;
        margin-top: 6px;
        font-style: normal;
        font-size: 12px;
        letter-spacing: 0.5px;
        color: #8a8275;
        font-family: "Arial", sans-serif;
        text-transform: uppercase;
      }

      .footer-pad {
        height: 24px;
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }
        .card {
          box-shadow: none;
          page-break-after: always;
        }
        .wire-once,
        .wire-status,
        .wire-header,
        .wire-home {
          display: none !important;
        }
      }

      @media (max-width: 600px) {
        body {
          padding-top: 94px;
          padding-bottom: 48px;
          padding-left: 0;
          padding-right: 0;
        }
        .card {
          max-width: 100%;
          margin: 0 0 24px;
        }
        .name-block h2 {
          font-size: 24px;
        }
        .name-block .epithet {
          font-size: 15px;
        }
        .dossier-head {
          padding: 12px 16px 0;
          font-size: 10px;
        }
        .hr {
          margin: 10px 16px 0;
        }
        .name-block {
          padding: 14px 16px 4px;
        }
        .gallery {
          padding: 12px 16px 6px;
        }
        .stats {
          margin: 14px 16px 4px;
        }
        .stat-row {
          flex-direction: column;
          gap: 2px;
          font-size: 14px;
        }
        .stat-row .label {
          flex: none;
          font-size: 11px;
        }
        .section {
          padding: 6px 16px 0;
        }
        .section p {
          font-size: 16.5px;
          line-height: 1.7;
        }
        ul.hooks li {
          font-size: 16px;
        }
        blockquote {
          margin: 14px 16px 6px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== WIRE CHROME ===== -->
    <div class="wire-once" aria-hidden="true"></div>

      <span class="caption" id="lb-caption"></span>
    </div>

      // ===================== RENDER ENGINE =====================
      // You shouldn't need to edit anything below this line.
      // New districts don't need any engine changes — section
      // dividers are generated automatically from the "district"
      // field on each location, in order of first appearance.

      function escapeAttr(str) {
        return String(str).replace(/"/g, "&quot;");
      }

      function renderCard(loc) {
        const c = loc.colors || {};
        const hasImages = (loc.images || []).length > 0;
        const gallery = hasImages
          ? `<div class="gallery" data-gallery="${loc.id}">${loc.images
              .map(
                (src) => `
                <div class="thumb" data-full="${escapeAttr(src)}" data-caption="${escapeAttr(loc.name)}">
                  <img src="${escapeAttr(src)}" alt="${escapeAttr(loc.name)}" />
                </div>`,
              )
              .join("")}</div>`
          : "";

        const stats = (loc.stats || [])
          .map(
            (s) => `
                <div class="stat-row">
                  <span class="label">${s.label}</span><span class="value">${s.value}</span>
                </div>`,
          )
          .join("");

        const sections = (loc.sections || [])
          .map((sec) => {
            const heading = sec.heading ? `<h3>${sec.heading}</h3>` : "";
            const paras = (sec.paragraphs || [])
              .map((p) => `<p>${p}</p>`)
              .join("");
            const hooks = sec.hooks
              ? `<ul class="hooks">${sec.hooks.map((h) => `<li>${h}</li>`).join("")}</ul>`
              : "";
            return heading + paras + hooks;
          })
          .join("");

        const quote = loc.quote
          ? `<blockquote>${loc.quote.text}<span class="cite">${loc.quote.cite}</span></blockquote>`
          : "";

        return `
              <div class="card" style="--rule:${c.rule || "#b8902f"}; --accent:${c.accent || "#b8902f"}">
                <div class="stripe" style="background:${c.stripe || c.rule || "#b8902f"}"></div>
                <div class="dossier-head">
                  <span>FILE NO. ${loc.fileNo || "—"}</span>
                  <span class="stamp" style="color:${c.stampColor || c.accent || "#b8902f"}">${loc.stamp || ""}</span>
                </div>
                <hr class="hr" />
                <div class="name-block">
                  <h2>${loc.name}</h2>
                  <p class="epithet">${loc.epithet || ""}</p>
                </div>
                ${gallery}
                <div class="stats">${stats}</div>
                <div class="section">${sections}</div>
                ${quote}
                <div class="footer-pad"></div>
              </div>`;
      }

      function renderSectionDivider(label, isFirst) {
        return `
              <div class="section-divider${isFirst ? " first" : ""}">
                <span class="section-divider-label">${label}</span>
              </div>`;
      }

      function renderAll() {
        const root = document.getElementById("cards-root");
        const districts = [];
        LOCATIONS.forEach((loc) => {
          if (!districts.includes(loc.district)) districts.push(loc.district);
        });

        let html = "";
        districts.forEach((district, i) => {
          html += renderSectionDivider(district, i === 0);
          html += LOCATIONS.filter((loc) => loc.district === district)
            .map(renderCard)
            .join("");
        });
        root.innerHTML = html;
        wireGalleries();
      }

      // ===================== LIGHTBOX =====================
      function wireGalleries() {
        const lightbox = document.getElementById("lightbox");
        const lbImg = document.getElementById("lb-img");
        const lbCaption = document.getElementById("lb-caption");
        let currentGallery = [];
        let currentIndex = 0;

        function showCurrent() {
          const thumb = currentGallery[currentIndex];
          lbImg.src = thumb.getAttribute("data-full");
          lbCaption.textContent = thumb.getAttribute("data-caption") || "";
          const multi = currentGallery.length > 1;
          document.getElementById("lb-prev").style.display = multi
            ? "block"
            : "none";
          document.getElementById("lb-next").style.display = multi
            ? "block"
            : "none";
        }

        function openLightbox(galleryName, index) {
          currentGallery = Array.prototype.slice.call(
            document.querySelectorAll(
              '.gallery[data-gallery="' + galleryName + '"] .thumb',
            ),
          );
          currentIndex = index;
          showCurrent();
          lightbox.classList.add("open");
        }

        function closeLightbox() {
          lightbox.classList.remove("open");
          lbImg.src = "";
        }

        document.querySelectorAll(".gallery .thumb").forEach((thumb) => {
          thumb.addEventListener("click", () => {
            const gallery = thumb.closest(".gallery");
            const galleryName = gallery.getAttribute("data-gallery");
            const thumbs = Array.prototype.slice.call(
              gallery.querySelectorAll(".thumb"),
            );
            openLightbox(galleryName, thumbs.indexOf(thumb));
          });
        });

        document.getElementById("lb-close").onclick = closeLightbox;
        lightbox.onclick = (e) => {
          if (e.target === lightbox) closeLightbox();
        };
        document.getElementById("lb-prev").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex =
            (currentIndex - 1 + currentGallery.length) % currentGallery.length;
          showCurrent();
        };
        document.getElementById("lb-next").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex = (currentIndex + 1) % currentGallery.length;
          showCurrent();
        };
        document.addEventListener("keydown", (e) => {
          if (!lightbox.classList.contains("open")) return;
          if (e.key === "Escape") closeLightbox();
          if (e.key === "ArrowLeft") document.getElementById("lb-prev").click();
          if (e.key === "ArrowRight")
            document.getElementById("lb-next").click();
        });
      }

      renderAll();

      // ===== WIRE CLOCK =====
      (function () {
        function tick() {
          var el = document.getElementById('wire-clock');
          if (!el) return;
          var n = new Date();
          var h = String(n.getHours()).padStart(2, '0');
          var m = String(n.getMinutes()).padStart(2, '0');
          el.textContent = h + ':' + m;
        }
        tick();
        setInterval(tick, 15000);
      })();
    </script>
