<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate City: 1999 &mdash; Wire</title>
    <style>
      :root {
        --paper: #f3efe6;
        --line: #cfc6b0;
        --gold: #b8902f;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #0d1118;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        overflow-x: hidden;
      }
      body {
        padding-top: 76px;
        padding-bottom: 56px;
        min-height: 100vh;
      }
      /* ===== WIRE CHROME ===== */
      .wire-once {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: #7c3aed;
        z-index: 200;
      }
      .wire-status {
        position: fixed;
        top: 4px; left: 0; right: 0;
        height: 36px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 200;
      }
      .wire-status-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .wire-sig {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
      }
      .wire-sig span {
        width: 3px;
        border-radius: 1px;
        background: #c9a227;
        display: inline-block;
      }
      .wire-skam {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: .8px;
        color: #c9a227;
      }
      .wire-jail {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #e05a3a;
        border: 1px solid rgba(224,90,58,.4);
        background: rgba(224,90,58,.08);
        padding: 2px 5px;
        border-radius: 2px;
      }
      .wire-clock {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11.5px;
        color: #6a7d90;
        letter-spacing: .3px;
      }
      .wire-status-right { display: flex; align-items: center; }
      .wire-batt {
        width: 20px;
        height: 11px;
        border: 1.5px solid #4a5a6a;
        border-radius: 2px;
        padding: 1.5px;
        position: relative;
      }
      .wire-batt::after {
        content: '';
        position: absolute;
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        width: 2px;
        height: 5px;
        background: #4a5a6a;
        border-radius: 0 1px 1px 0;
      }
      .wire-batt-fill {
        height: 100%;
        width: 72%;
        background: #c9a227;
        border-radius: 1px;
      }
      .wire-home {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 32px;
        background: #0c0f16;
        border-top: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .wire-home-ind {
        width: 90px;
        height: 4px;
        background: #1e2840;
        border-radius: 2px;
      }
      @media print {
        .wire-once, .wire-status, .wire-home { display: none !important; }
      }

      /* ===== HOME SCREEN ===== */
      .hs-wrap {
        max-width: 420px;
        margin: 0 auto;
        padding: 18px 0 0;
      }
      .hs-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 0 22px;
      }
      .hs-row + .hs-row { margin-top: 14px; }
      .hs-icon {
        flex: 1 1 0;
        max-width: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .hs-icon-tile {
        width: 100%;
        max-width: 78px;
        aspect-ratio: 1;
        margin: 0 auto;
        border: 1px solid rgba(201,162,39,.35);
        border-radius: 16px;
        background: rgba(255,255,255,.025);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hs-icon-tile svg {
        width: 36px;
        height: 36px;
        stroke: #c9a227;
        fill: none;
      }
      .hs-icon-label {
        font-size: 9px;
        letter-spacing: 1.1px;
        text-transform: uppercase;
        color: #b8902f;
        text-align: center;
      }
      .hs-plat-glyph {
        position: relative;
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 28px;
        font-weight: 700;
        color: #c9a227;
        line-height: 1;
      }
      .hs-plat-glyph::after {
        content: '';
        position: absolute;
        left: -7px; right: -7px;
        top: 50%;
        height: 2px;
        background: #c9a227;
        transform: rotate(-30deg);
      }

      .hs-stage {
        position: relative;
        min-height: 218px;
        margin-top: 14px;
      }
      .hs-stage-static {
        min-height: 0;
      }
      .hs-stage-fixed { position: absolute; top: 0; right: 0; bottom: 0; left: 0; }
      .hs-fade {
        transition: opacity .45s ease, transform .45s ease;
      }
      .hs-fade-hidden {
        opacity: 0;
        transform: translateY(14px);
        pointer-events: none;
      }

      .hs-warn-box {
        position: relative;
        margin: 0 22px;
        border: 1px solid rgba(224,90,58,.32);
        border-radius: 4px;
        background: rgba(224,90,58,.07);
        box-shadow: 0 0 18px rgba(224,90,58,.22), inset 0 0 16px rgba(224,90,58,.08);
        padding: 20px 16px;
        text-align: center;
        animation: warn-pulse 0.9s ease-in-out infinite;
      }
      .hs-warn-corner {
        position: absolute;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(224,90,58,.9);
      }
      .hs-warn-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
      .hs-warn-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
      .hs-warn-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
      .hs-warn-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
      @keyframes warn-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .3; }
      }
      .hs-warn-icon { width: 26px; height: 26px; color: #e05a3a; margin: 0 auto 10px; stroke: currentColor; fill: none; }
      .hs-warn-line {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: #e05a3a;
      }
      .hs-warn-hr {
        height: 1px;
        width: 65%;
        background: rgba(224,90,58,.35);
        margin: 9px auto;
      }
      .hs-warn-big {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #e05a3a;
        margin-top: 4px;
      }

      .hs-notifs {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 22px;
      }
      .hs-notif {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: rgba(124,58,237,.16);
        border: 1px solid rgba(124,58,237,.45);
        border-radius: 14px;
        padding: 12px 14px;
        text-decoration: none;
        box-shadow: 0 0 16px rgba(124,58,237,.16);
        transition: background .2s ease, transform .15s ease;
      }
      .hs-notif:hover { background: rgba(124,58,237,.23); }
      .hs-notif:active { transform: scale(.98); }
      .hs-notif-avatar {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #241531;
        border: 1px solid rgba(154,111,217,.6);
        color: #c9b3f0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }
      .hs-notif-body { flex: 1; min-width: 0; }
      .hs-notif-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 3px;
        gap: 8px;
      }
      .hs-notif-sender {
        font-size: 12.5px;
        font-weight: 600;
        color: #f0eaf9;
      }
      .hs-notif-time {
        font-size: 9px;
        color: rgba(240,234,249,.5);
        flex-shrink: 0;
      }
      .hs-notif-text {
        font-size: 11.5px;
        line-height: 1.45;
        color: rgba(240,234,249,.9);
      }

      .hs-dots {
        display: flex;
        justify-content: center;
        gap: 7px;
        margin-top: 22px;
      }
      .hs-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(201,162,39,.3);
      }
      .hs-dot.active { background: #c9a227; }

      @media (max-width: 420px) {
        .hs-row { padding: 0 16px; }
        .hs-notifs { padding: 0 16px; }
        .hs-warn-box { margin: 0 16px; }
      }
    </style>
  </head>
  <body>
    <!-- ===== WIRE CHROME ===== -->
    <div class="wire-once" aria-hidden="true"></div>
    <div class="wire-status">
      <div class="wire-status-left">
        <div class="wire-sig" aria-label="Signal: 4 of 5 bars">
          <span style="height:4px"></span>
          <span style="height:6px"></span>
          <span style="height:9px"></span>
          <span style="height:11px"></span>
          <span style="height:12px;opacity:.28"></span>
        </div>
        <span class="wire-skam">S.K.AM</span>
        <span class="wire-jail">JAILBROKEN</span>
      </div>
      <span class="wire-clock" id="wire-clock"></span>
      <div class="wire-status-right">
        <div class="wire-batt" aria-label="Battery 72%">
          <div class="wire-batt-fill"></div>
        </div>
      </div>
    </div>

    <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Fate City: 1999 Wire home screen</h1>

    <div class="hs-wrap">
      <div class="hs-row hs-row-top">
        <div class="hs-icon">
          <div class="hs-icon-tile">
            <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 3v-3H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/>
            </svg>
          </div>
          <span class="hs-icon-label">Messages</span>
        </div>
        <div class="hs-icon">
          <div class="hs-icon-tile">
            <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6.7 4h2.7l1.4 3.8-2 1.6a12.3 12.3 0 0 0 5.8 5.8l1.6-2 3.8 1.4v2.7a2 2 0 0 1-2 2C10.8 19.3 4.7 13.2 4.7 6a2 2 0 0 1 2-2z"/>
            </svg>
          </div>
          <span class="hs-icon-label">Phone</span>
        </div>
        <div class="hs-icon">
          <div class="hs-icon-tile">
            <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="1.5"/>
              <line x1="4" y1="9.5" x2="20" y2="9.5"/>
              <line x1="8" y1="3" x2="8" y2="6.2"/>
              <line x1="16" y1="3" x2="16" y2="6.2"/>
              <text x="12" y="16.3" font-size="6.5" text-anchor="middle" fill="currentColor" stroke="none" font-family="Arial, sans-serif" font-weight="700">31</text>
            </svg>
          </div>
          <span class="hs-icon-label">Calendar</span>
        </div>
      </div>

      <div class="hs-stage hs-stage-static" id="hs-stage">
        <div class="hs-notifs" id="hs-notifs">
          <a class="hs-notif" href="persons.html">
            <div class="hs-notif-avatar">M</div>
            <div class="hs-notif-body">
              <div class="hs-notif-top">
                <span class="hs-notif-sender">Unknown</span>
                <span class="hs-notif-time">Now</span>
              </div>
              <div class="hs-notif-text">Persons of Interest is ready. Everyone worth knowing in Fate City &mdash; for now.</div>
            </div>
          </a>
          <a class="hs-notif" href="locations.html">
            <div class="hs-notif-avatar">M</div>
            <div class="hs-notif-body">
              <div class="hs-notif-top">
                <span class="hs-notif-sender">Unknown</span>
                <span class="hs-notif-time">Now</span>
              </div>
              <div class="hs-notif-text">Locations is ready. Every address worth remembering, starting with the ones you'll need first.</div>
            </div>
          </a>
        </div>
      </div>

      <div class="hs-dots">
        <span class="hs-dot active"></span>
        <span class="hs-dot"></span>
        <span class="hs-dot"></span>
      </div>
    </div>

    <!-- ===== WIRE HOME BAR ===== -->
    <div class="wire-home">
      <div class="wire-home-ind" aria-hidden="true"></div>
    </div>

    <script>

      // ===== WIRE CLOCK =====
      (function () {
        function tick() {
          var el = document.getElementById('wire-clock');
          if (!el) return;
          var n = new Date();
          var h = String(n.getHours()).padStart(2, '0');
          var m = String(n.getMinutes()).padStart(2, '0');
          el.textContent = h + ':' + m;
        }
        tick();
        setInterval(tick, 15000);
      })();

    </script>
  </body>
</html>
