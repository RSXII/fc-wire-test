<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate City: 1999 — Persons of Interest</title>
    <style>
      :root {
        --paper: #f3efe6;
        --paper-dark: #e8e1d2;
        --ink: #1c1a17;
        --ink-soft: #4a4540;
        --gold: #b8902f;
        --line: #cfc6b0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0d1118;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
        padding-top: 94px;
        padding-bottom: 48px;
        overflow-x: hidden;
      }
      /* ===== WIRE CHROME ===== */
      .wire-once {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: #7c3aed;
        z-index: 200;
      }
      .wire-status {
        position: fixed;
        top: 4px; left: 0; right: 0;
        height: 36px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 200;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-status-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .wire-sig {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
      }
      .wire-sig span {
        width: 3px;
        border-radius: 1px;
        background: #c9a227;
        display: inline-block;
      }
      .wire-skam {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: .8px;
        color: #c9a227;
      }
      .wire-jail {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #e05a3a;
        border: 1px solid rgba(224,90,58,.4);
        background: rgba(224,90,58,.08);
        padding: 2px 5px;
        border-radius: 2px;
      }
      .wire-clock {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11.5px;
        color: #6a7d90;
        letter-spacing: .3px;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-status-right {
        display: flex;
        align-items: center;
      }
      .wire-batt {
        width: 20px;
        height: 11px;
        border: 1.5px solid #4a5a6a;
        border-radius: 2px;
        padding: 1.5px;
        position: relative;
      }
      .wire-batt::after {
        content: '';
        position: absolute;
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        width: 2px;
        height: 5px;
        background: #4a5a6a;
        border-radius: 0 1px 1px 0;
      }
      .wire-batt-fill {
        height: 100%;
        width: 72%;
        background: #c9a227;
        border-radius: 1px;
      }
      .wire-header {
        position: fixed;
        top: 40px; left: 0; right: 0;
        height: 50px;
        background: #0c0f16;
        border-bottom: 1px solid #1a2030;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        z-index: 200;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      }
      .wire-hdr-back {
        font-size: 22px;
        color: #c9a227;
        opacity: .9;
        user-select: none;
        text-decoration: none;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      .wire-hdr-back:hover { opacity: 1; }
      .wire-hdr-text { flex: 1; }
      .wire-hdr-title {
        font-size: 13.5px;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: #e8dfc8;
        line-height: 1.1;
      }
      .wire-hdr-sub {
        font-size: 9.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #3a4a5a;
        margin-top: 2px;
      }
      .wire-hdr-more {
        font-size: 18px;
        color: #3a4a5a;
      }
      .wire-home {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 32px;
        background: #0c0f16;
        border-top: 1px solid #1a2030;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .wire-home-ind {
        width: 90px;
        height: 4px;
        background: #1e2840;
        border-radius: 2px;
      }
      .section-divider {
        max-width: 760px;
        margin: 48px auto 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .section-divider.first {
        margin-top: 28px;
      }
      .section-divider::before,
      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(184, 144, 47, 0.25),
          transparent
        );
      }
      .section-divider-label {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #8a7a3a;
        white-space: nowrap;
      }

      .card {
        max-width: 760px;
        margin: 0 auto 36px;
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(0, 0, 0, 0.05) inset;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.015) 0px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
      }
      .stripe {
        height: 6px;
      }

      .dossier-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 28px 0;
        font-family: "Arial", sans-serif;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--ink-soft);
      }
      .dossier-head .stamp {
        font-weight: 700;
        letter-spacing: 1.5px;
      }
      .hr {
        margin: 10px 28px 0;
        border: none;
        border-top: 2px solid var(--rule, var(--gold));
      }

      .name-block {
        padding: 18px 28px 4px;
      }
      .name-block h2 {
        font-family: "Arial Black", "Arial", sans-serif;
        font-size: 30px;
        margin: 0;
        letter-spacing: 0.5px;
        color: #191713;
      }
      .name-block .epithet {
        font-style: italic;
        font-size: 15px;
        margin: 6px 0 0;
        color: var(--accent, var(--gold));
      }

      .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 14px 28px 6px;
      }
      .gallery .thumb {
        width: 92px;
        height: 92px;
        overflow: hidden;
        border: 1px solid var(--line);
        cursor: pointer;
        background: #fff;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .gallery .thumb:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
      }
      .gallery .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 9, 7, 0.92);
        z-index: 999;
        align-items: center;
        justify-content: center;
        padding: 30px;
        cursor: zoom-out;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 92vw;
        max-height: 88vh;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        border: 1px solid #444;
        cursor: default;
      }
      .lightbox .caption {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      .lightbox .close-x {
        position: absolute;
        top: 18px;
        right: 26px;
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 28px;
        cursor: pointer;
        line-height: 1;
      }
      .lightbox .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: #cfc6b0;
        font-family: "Arial", sans-serif;
        font-size: 36px;
        cursor: pointer;
        padding: 10px 16px;
        user-select: none;
      }
      .lightbox .nav-arrow.prev {
        left: 6px;
      }
      .lightbox .nav-arrow.next {
        right: 6px;
      }

      .stats {
        margin: 18px 28px 4px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
      }
      .stat-row {
        display: flex;
        gap: 14px;
        padding: 5px 0;
        font-family: "Arial", sans-serif;
        font-size: 13px;
      }
      .stat-row .label {
        flex: 0 0 130px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--accent, var(--gold));
        text-transform: uppercase;
        font-size: 11.5px;
      }
      .stat-row .value {
        color: #222;
      }

      .section {
        padding: 6px 28px 0;
      }
      .section h3 {
        font-family: "Arial", sans-serif;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #222;
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
        margin: 20px 0 10px;
      }
      .section p {
        font-size: 15.5px;
        line-height: 1.65;
        color: #2a2722;
        margin: 0 0 12px;
      }
      ul.hooks {
        margin: 0 0 6px;
        padding-left: 0;
        list-style: none;
      }
      ul.hooks li {
        font-size: 15px;
        line-height: 1.55;
        color: #2a2722;
        margin: 0 0 9px;
        padding-left: 20px;
        position: relative;
      }
      ul.hooks li::before {
        content: "\2013";
        position: absolute;
        left: 0;
        color: var(--accent, var(--gold));
        font-weight: 700;
      }

      blockquote {
        margin: 16px 28px 6px;
        padding: 6px 0 6px 18px;
        border-left: 3px solid var(--accent, var(--gold));
        font-style: italic;
        font-size: 15px;
        color: #3a3630;
      }
      blockquote .cite {
        display: block;
        margin-top: 6px;
        font-style: normal;
        font-size: 12px;
        letter-spacing: 0.5px;
        color: #8a8275;
        font-family: "Arial", sans-serif;
        text-transform: uppercase;
      }

      .footer-pad {
        height: 24px;
      }

      .redacted-gate {
        margin: 4px 28px 18px;
        padding: 14px 16px;
        background: #0d0c0a;
        border: 1px solid #000;
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .redacted-gate input {
        background: #1a1815;
        border: 1px solid #3a3630;
        color: #cfc6b0;
        font-family: "Courier New", monospace;
        font-size: 14px;
        letter-spacing: 3px;
        padding: 8px 12px;
        width: 160px;
        outline: none;
      }
      .redacted-gate input:focus {
        border-color: #6b6660;
      }
      .redacted-gate button {
        background: #1a1815;
        border: 1px solid #3a3630;
        color: #cfc6b0;
        font-size: 16px;
        padding: 8px 14px;
        cursor: pointer;
      }
      .redacted-gate button:hover {
        border-color: #6b6660;
      }
      .redacted-gate.shake {
        animation: redacted-shake 0.4s ease;
      }
      @keyframes redacted-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }
      @media (max-width: 600px) {
        .redacted-gate {
          margin: 4px 16px 16px;
          padding: 12px 14px;
        }
      }

      .redacted-block {
        margin: 4px 28px 18px;
        padding: 16px 18px;
        background: #0d0c0a;
        border: 1px solid #000;
        box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.6);
        opacity: 0;
        max-height: 0;
        overflow: hidden;
        transition:
          opacity 0.9s ease,
          max-height 0.9s ease;
      }
      .redacted-block.revealed {
        opacity: 1;
        max-height: 2000px;
      }
      .redacted-block .redacted-heading {
        font-family: "Arial", sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #c94f4f;
        margin: 0 0 4px;
      }
      .redacted-block .redacted-sub {
        font-family: "Arial", sans-serif;
        font-style: italic;
        font-size: 11px;
        color: #6b6660;
        margin: 0 0 14px;
        line-height: 1.5;
      }
      .redacted-block p {
        font-family: "Courier New", monospace;
        font-size: 13.5px;
        line-height: 1.7;
        color: #cfc6b0;
        margin: 0 0 12px;
        letter-spacing: 0.3px;
      }
      @media (max-width: 600px) {
        .redacted-block {
          margin: 4px 16px 16px;
          padding: 14px 14px;
        }
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }
        .card {
          box-shadow: none;
          page-break-after: always;
        }
        .wire-once,
        .wire-status,
        .wire-header,
        .wire-home {
          display: none !important;
        }
      }

      @media (max-width: 600px) {
        body {
          padding-top: 94px;
          padding-bottom: 48px;
          padding-left: 0;
          padding-right: 0;
        }
        .card {
          max-width: 100%;
          margin: 0 0 24px;
        }
        .name-block h2 {
          font-size: 24px;
        }
        .name-block .epithet {
          font-size: 15px;
        }
        .dossier-head {
          padding: 12px 16px 0;
          font-size: 10px;
        }
        .hr {
          margin: 10px 16px 0;
        }
        .name-block {
          padding: 14px 16px 4px;
        }
        .gallery {
          padding: 12px 16px 6px;
        }
        .stats {
          margin: 14px 16px 4px;
        }
        .stat-row {
          flex-direction: column;
          gap: 2px;
          font-size: 14px;
        }
        .stat-row .label {
          flex: none;
          font-size: 11px;
        }
        .section {
          padding: 6px 16px 0;
        }
        .section p {
          font-size: 16.5px;
          line-height: 1.7;
        }
        ul.hooks li {
          font-size: 16px;
        }
        blockquote {
          margin: 14px 16px 6px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== WIRE CHROME ===== -->
    <div class="wire-once" aria-hidden="true"></div>
    <div class="wire-status">
      <div class="wire-status-left">
        <div class="wire-sig" aria-label="Signal: 4 of 5 bars">
          <span style="height:4px"></span>
          <span style="height:6px"></span>
          <span style="height:9px"></span>
          <span style="height:11px"></span>
          <span style="height:12px;opacity:.28"></span>
        </div>
        <span class="wire-skam">S.K.AM</span>
        <span class="wire-jail">JAILBROKEN</span>
      </div>
      <span class="wire-clock" id="wire-clock"></span>
      <div class="wire-status-right">
        <div class="wire-batt" aria-label="Battery 72%">
          <div class="wire-batt-fill"></div>
        </div>
      </div>
    </div>
    <div class="wire-header">
      <a class="wire-hdr-back" href="home.html" aria-label="Back to home screen">&lsaquo;</a>
      <div class="wire-hdr-text">
        <div class="wire-hdr-title">Persons of Interest</div>
        <div class="wire-hdr-sub">Fate City: 1999 &mdash; Benefactor File</div>
      </div>
      <span class="wire-hdr-more" aria-hidden="true">&vellip;</span>
    </div>

    <div id="cards-root"></div>

    <div class="lightbox" id="lightbox">
      <span class="close-x" id="lb-close">&times;</span>
      <span class="nav-arrow prev" id="lb-prev">&#8249;</span>
      <img id="lb-img" src="" alt="" />
      <span class="nav-arrow next" id="lb-next">&#8250;</span>
      <span class="caption" id="lb-caption"></span>
    </div>

    <!-- ======================================================= -->
    <!--  EDIT BELOW THIS LINE TO ADD / CHANGE NPCs                -->
    <!--  Everything above is layout/styling and rarely needs       -->
    <!--  to be touched. Each object in NPCS below is one dossier.  -->
    <!-- ======================================================= -->
    <script>
      const NPCS = [
        {
          id: "city-overview",
          category: "briefing",
          fileNo: "CO-000",
          stamp: "ESSENTIAL BRIEFING — READ FIRST",
          colors: {
            rule: "#8a6a1f",
            accent: "#b8902f",
            stripe: "#8a6a1f",
            stampColor: "#b8902f",
          },
          name: "FATE CITY",
          epithet:
            "Everyone in this city is selling something. The trick is figuring out what \u2014 and what it's actually going to cost you to buy it.",
          images: ["images/fate_city_logo.png"],
          stats: [
            { label: "Currency", value: "Platinum (\u201cplat\u201d)" },
            { label: "Districts", value: "Nineteen, and growing" },
            {
              label: "Tech Level",
              value: "Modern-adjacent \u2014 Weave-fused, not chrome",
            },
            { label: "Population", value: "Dense, mixed, never fully counted" },
            { label: "Defining Trait", value: "Everything has a price" },
          ],
          sections: [
            {
              heading: "Overview",
              paragraphs: [
                "Fate City sprawls across nineteen districts of glass towers, corporate logos, and street-level grit the glass towers would rather you not look at too closely. It runs modern \u2014 Wires in every pocket, plat in every transaction, traffic that never quite stops \u2014 filtered through Weave-tech instead of chrome: magitech grafted in close enough to skin that most of the city stopped noticing the seam years ago.",
                "Dryads, elves, fairies, tieflings, and every other shape a person can apparently come in walk these streets doing the same ordinary, exhausted things everyone else does \u2014 which either means the city's population is far stranger than it looks, or far more ordinary than it advertises. Both readings have their believers.",
                "Two paths officially exist for anyone who can do something the rest of the city can't: register with the Agency, or don't and hope nobody notices. Nocturnal quietly built a third option out of that gap. None of the three are advertised as a choice anyone should feel good about making.",
              ],
            },
            {
              heading: "A Note From Your Benefactor",
              hooks: [
                "The Wire in your pocket is the only thing standing between you and S.K.AM's network logging your location by default. Don't lose it, and don't hand it to anyone who'd know how to look inside it.",
                "Plat moves everything here, including conversations. If a door isn't opening, you're either talking to the wrong person or not offering enough of it.",
                "You'll meet plenty of names in this file before you meet them in person. Start wherever the work takes you \u2014 the city has more interest in all of you than you'll have time to return.",
                "The Agency doesn't patrol so much as it notices. Staying off its radar is mostly about staying boring, right up until you can't afford to be.",
              ],
            },
          ],
          quote: {
            text: "Everybody's got an angle in this city. The smart ones just never tell you what it costs until you're already in the room.",
            cite: "Overheard, Fate City Radio call-in segment",
          },
        },

        {
          id: "bloomwork",
          category: "briefing",
          fileNo: "BW-015",
          stamp: "CULTURAL INTELLIGENCE — TRENDING",
          colors: {
            rule: "#7a2048",
            accent: "#c9527a",
            stripe: "#7a2048",
            stampColor: "#c9527a",
          },
          name: "&ldquo;BLOOMWORK&rdquo;",
          epithet:
            "Antlers, wings, horns, fins, bark for skin \u2014 half the city's wearing something it wasn't born with, and the other half stopped asking which half is which.",
          images: ["images/fantac_magazine.png"],
          stats: [
            { label: "Status", value: "Citywide, and still climbing" },
            {
              label: "Cost",
              value: "Plat up front; Seam-essence under the hood",
            },
            { label: "Fray Cost", value: "None \u2014 purely cosmetic" },
            {
              label: "Market Leaders",
              value:
                "S.K.AM Technologies (consumer); Galv\u00e8re (couture); a dozen budget storefronts (everything else)",
            },
            {
              label: "Social Read",
              value: "Normal to ask about. Not always normal to be asked back.",
            },
          ],
          sections: [
            {
              heading: "Overview",
              paragraphs: [
                "Call it Bloomwork, call it getting Woven, call it whatever the boutique on the corner is branding it this season \u2014 the city's single biggest beauty trend right now is buying the look of a race you weren't born into. Antlers, fey ears, a tail, bark-grain skin, real feathers instead of a feather motif: all of it achievable in an afternoon chair, all of it pure Weave-fused cosmetic work, and none of it changes a single thing about what's actually underneath. No Fray cost, no Humanity on the line \u2014 just plat for the procedure and a draw on the city's already-finite Seam-essence supply, the same resource that keeps the lights on in half the magitech in this town.",
                "S.K.AM Technologies runs the largest consumer line \u2014 glossy, mid-market, advertised on every surface a Wire can render an ad onto. Above that sits actual couture: Galv\u00e8re-sponsored work that costs what a car costs and reads like it the moment you walk into a room. Below it sits a dozen storefronts doing the same procedure for a fraction of the price, on equipment that's a generation behind and occasionally shows it.",
              ],
            },
            {
              heading: "A Note From Your Benefactor",
              hooks: [
                "It's a completely normal question in this city to ask whether someone's look is natural or bought. Nobody considers it rude. They might consider you naive for assuming it's the former.",
                "None of this touches Fray. Whatever you choose to look like, your humanity isn't the currency being spent \u2014 your wallet and the city's Seam supply are.",
                "A couture job and a budget job can produce the exact same antlers. They do not produce the exact same room when you walk into one wearing it.",
                "Every so often, somebody's look turns out to be real instead of bought. Nobody ever expects it \u2014 which is exactly why it keeps working.",
              ],
            },
          ],
          quote: {
            text: "Why be born when you can be designed?",
            cite: "S.K.AM Technologies ad campaign, citywide Wire placement",
          },
        },

        {
          id: "casven",

      // ===================== RENDER ENGINE =====================
      // You shouldn't need to edit anything below this line.

      function escapeAttr(str) {
        return String(str).replace(/"/g, "&quot;");
      }

      function renderCard(npc) {
        const c = npc.colors || {};
        const gallery = (npc.images || [])
          .map(
            (src) => `
                <div class="thumb" data-full="${escapeAttr(src)}" data-caption="${escapeAttr(npc.name)}">
                  <img src="${escapeAttr(src)}" alt="${escapeAttr(npc.name)}" />
                </div>`,
          )
          .join("");

        const stats = (npc.stats || [])
          .map(
            (s) => `
                <div class="stat-row">
                  <span class="label">${s.label}</span><span class="value">${s.value}</span>
                </div>`,
          )
          .join("");

        const sections = (npc.sections || [])
          .map((sec) => {
            const heading = sec.heading ? `<h3>${sec.heading}</h3>` : "";
            const paras = (sec.paragraphs || [])
              .map((p) => `<p>${p}</p>`)
              .join("");
            const hooks = sec.hooks
              ? `<ul class="hooks">${sec.hooks.map((h) => `<li>${h}</li>`).join("")}</ul>`
              : "";
            return heading + paras + hooks;
          })
          .join("");

        const quote = npc.quote
          ? `<blockquote>${npc.quote.text}<span class="cite">${npc.quote.cite}</span></blockquote>`
          : "";

        const redacted = npc.redactedEncoded
          ? `<div class="redacted-gate" data-redacted-gate="${npc.id}">
                  <input type="password" autocomplete="off" spellcheck="false" />
                  <button type="button">&#8594;</button>
                </div>
                <div class="redacted-block" data-redacted="${npc.id}" data-encoded="${npc.redactedEncoded}"></div>`
          : "";

        return `
              <div class="card" style="--rule:${c.rule || "#b8902f"}; --accent:${c.accent || "#b8902f"}">
                <div class="stripe" style="background:${c.stripe || c.rule || "#b8902f"}"></div>
                <div class="dossier-head">
                  <span>FILE NO. ${npc.fileNo || "—"}</span>
                  <span class="stamp" style="color:${c.stampColor || c.accent || "#b8902f"}">${npc.stamp || ""}</span>
                </div>
                <hr class="hr" />
                <div class="name-block">
                  <h2>${npc.name}</h2>
                  <p class="epithet">${npc.epithet || ""}</p>
                </div>
                <div class="gallery" data-gallery="${npc.id}">${gallery}</div>
                <div class="stats">${stats}</div>
                <div class="section">${sections}</div>
                ${quote}
                ${redacted}
                <div class="footer-pad"></div>
              </div>`;
      }

      function renderSectionDivider(label, isFirst) {
        return `
              <div class="section-divider${isFirst ? " first" : ""}">
                <span class="section-divider-label">${label}</span>
              </div>`;
      }

      function renderAll() {
        const root = document.getElementById("cards-root");
        const briefings = NPCS.filter((n) => n.category === "briefing");
        const persons = NPCS.filter((n) => n.category === "person");
        const organizations = NPCS.filter((n) => n.category === "organization");

        let html = "";
        if (briefings.length) {
          html += renderSectionDivider("City Briefing", true);
          html += briefings.map(renderCard).join("");
        }
        if (persons.length) {
          html += renderSectionDivider(
            "Persons of Interest",
            !briefings.length,
          );
          html += persons.map(renderCard).join("");
        }
        if (organizations.length) {
          html += renderSectionDivider("Organizations of Interest", false);
          html += organizations.map(renderCard).join("");
        }
        root.innerHTML = html;
        wireGalleries();
        wirePasswordReveal();
      }

      // ===================== HIDDEN REVEAL =====================
      // NPCs with a `redactedEncoded` field get a bare password field
      // rendered in place of their redacted dossier section. No label,
      // no hint text — just the input. Correct password decodes the
      // base64 payload client-side and swaps it in.
      function wirePasswordReveal() {
        const PASSWORD = "03171989";

        document.querySelectorAll(".redacted-gate").forEach((gate) => {
          const npcId = gate.getAttribute("data-redacted-gate");
          const input = gate.querySelector("input");
          const block = document.querySelector(
            '.redacted-block[data-redacted="' + npcId + '"]',
          );
          if (!input || !block) return;

          function attemptUnlock() {
            const value = input.value.trim().toLowerCase();
            if (value !== PASSWORD) {
              input.value = "";
              gate.classList.add("shake");
              setTimeout(() => gate.classList.remove("shake"), 400);
              return;
            }
            const encoded = block.getAttribute("data-encoded");
            try {
              const decoded = decodeURIComponent(
                Array.prototype.map
                  .call(
                    atob(encoded),
                    (c) =>
                      "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2),
                  )
                  .join(""),
              );
              block.innerHTML = decoded;
              block.classList.add("revealed");
              gate.remove();
            } catch (e) {
              // decode failed silently — leave gate in place
            }
          }

          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") attemptUnlock();
          });
          gate.querySelector("button").addEventListener("click", attemptUnlock);
        });
      }

      // ===================== LIGHTBOX =====================
      function wireGalleries() {
        const lightbox = document.getElementById("lightbox");
        const lbImg = document.getElementById("lb-img");
        const lbCaption = document.getElementById("lb-caption");
        let currentGallery = [];
        let currentIndex = 0;

        function showCurrent() {
          const thumb = currentGallery[currentIndex];
          lbImg.src = thumb.getAttribute("data-full");
          lbCaption.textContent = thumb.getAttribute("data-caption") || "";
          const multi = currentGallery.length > 1;
          document.getElementById("lb-prev").style.display = multi
            ? "block"
            : "none";
          document.getElementById("lb-next").style.display = multi
            ? "block"
            : "none";
        }

        function openLightbox(galleryName, index) {
          currentGallery = Array.prototype.slice.call(
            document.querySelectorAll(
              '.gallery[data-gallery="' + galleryName + '"] .thumb',
            ),
          );
          currentIndex = index;
          showCurrent();
          lightbox.classList.add("open");
        }

        function closeLightbox() {
          lightbox.classList.remove("open");
          lbImg.src = "";
        }

        document.querySelectorAll(".gallery .thumb").forEach((thumb) => {
          thumb.addEventListener("click", () => {
            const gallery = thumb.closest(".gallery");
            const galleryName = gallery.getAttribute("data-gallery");
            const thumbs = Array.prototype.slice.call(
              gallery.querySelectorAll(".thumb"),
            );
            openLightbox(galleryName, thumbs.indexOf(thumb));
          });
        });

        document.getElementById("lb-close").onclick = closeLightbox;
        lightbox.onclick = (e) => {
          if (e.target === lightbox) closeLightbox();
        };
        document.getElementById("lb-prev").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex =
            (currentIndex - 1 + currentGallery.length) % currentGallery.length;
          showCurrent();
        };
        document.getElementById("lb-next").onclick = (e) => {
          e.stopPropagation();
          if (currentGallery.length < 2) return;
          currentIndex = (currentIndex + 1) % currentGallery.length;
          showCurrent();
        };
        document.addEventListener("keydown", (e) => {
          if (!lightbox.classList.contains("open")) return;
          if (e.key === "Escape") closeLightbox();
          if (e.key === "ArrowLeft") document.getElementById("lb-prev").click();
          if (e.key === "ArrowRight")
            document.getElementById("lb-next").click();
        });
      }

      renderAll();

      // ===== WIRE CLOCK =====
      (function () {
        function tick() {
          var el = document.getElementById('wire-clock');
          if (!el) return;
          var n = new Date();
          var h = String(n.getHours()).padStart(2, '0');
          var m = String(n.getMinutes()).padStart(2, '0');
          el.textContent = h + ':' + m;
        }
        tick();
        setInterval(tick, 15000);
      })();
    </script>
    <!-- ===== WIRE HOME BAR ===== -->
    <div class="wire-home">
      <div class="wire-home-ind" aria-hidden="true"></div>
    </div>
